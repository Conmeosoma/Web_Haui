<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 1 - onfocus & onchange</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        
        input[type="text"] {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #aaa;
            border-radius: 4px;
            width: 200px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h3>Bài tập 1</h3>
    <label>Họ tên:</label>
    <input type="text" id="hoten" onfocus="alert('focus')" onchange="alert('change')" placeholder="Nhập họ tên..." />
</body>

</html>
