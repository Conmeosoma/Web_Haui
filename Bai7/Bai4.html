<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 4 - Phép Tính Đơn Giản</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }
        
        .calculator {
            display: inline-block;
            background: white;
            padding: 24px 30px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        
        .row label {
            width: 100px;
            font-size: 14px;
            text-align: right;
        }
        
        .row input[type="text"] {
            width: 180px;
            padding: 5px 8px;
            font-size: 14px;
            border: 1px solid #aaa;
            border-radius: 3px;
        }
        
        .row input[type="text"][readonly] {
            background: #f0f0f0;
            color: #333;
        }
        /* Hàng nút phép tính */
        
        .ops-row {
            display: flex;
            margin-bottom: 10px;
            margin-left: 110px;
            /* căn theo label */
            gap: 6px;
        }
        
        .ops-row button {
            width: 36px;
            height: 32px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #999;
            border-radius: 4px;
            background: #e8e8e8;
            transition: background 0.15s;
        }
        
        .ops-row button:hover {
            background: #d0d0d0;
        }
        
        .ops-row button.active {
            background: #0078d7;
            color: white;
            border-color: #005fa3;
        }
        
        #error-msg {
            color: red;
            font-size: 13px;
            margin-top: 6px;
            margin-left: 110px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <div class="row">
            <label>So thu nhat</label>
            <input type="text" id="so1" placeholder="Nhập số thứ nhất" />
        </div>

        <div class="ops-row">
            <button id="btn-add" onclick="chonPhep('+')" title="Cộng">+</button>
            <button id="btn-sub" onclick="chonPhep('-')" title="Trừ">-</button>
            <button id="btn-mul" onclick="chonPhep('*')" title="Nhân">*</button>
            <button id="btn-div" onclick="chonPhep('/')" title="Chia">/</button>
            <button id="btn-pow" onclick="chonPhep('^')" title="Lũy thừa">^</button>
        </div>

        <div class="row">
            <label>So thu hai</label>
            <input type="text" id="so2" placeholder="Nhập số thứ hai" />
        </div>

        <div class="row">
            <label>Ket qua</label>
            <input type="text" id="ketqua" readonly placeholder="Kết quả" />
        </div>

        <div id="error-msg"></div>
    </div>

    <script>
        var phepTinh = '+'; // mặc định là cộng
        // Highlight nút mặc định
        document.getElementById('btn-add').classList.add('active');

        function chonPhep(phep) {
            phepTinh = phep;

            // Bỏ highlight tất cả nút
            ['btn-add', 'btn-sub', 'btn-mul', 'btn-div', 'btn-pow'].forEach(function(id) {
                document.getElementById(id).classList.remove('active');
            });

            // Highlight nút đang chọn
            var idMap = {
                '+': 'btn-add',
                '-': 'btn-sub',
                '*': 'btn-mul',
                '/': 'btn-div',
                '^': 'btn-pow'
            };
            document.getElementById(idMap[phep]).classList.add('active');

            // Tự động tính lại nếu đã có số
            tinhToan();
        }

        // Tính lại khi người dùng gõ vào ô số
        document.getElementById('so1').addEventListener('input', tinhToan);
        document.getElementById('so2').addEventListener('input', tinhToan);

        function hienLoi(msg) {
            var errEl = document.getElementById('error-msg');
            errEl.textContent = msg;
            errEl.style.display = msg ? 'block' : 'none';
            document.getElementById('ketqua').value = '';
        }

        function tinhToan() {
            var s1 = document.getElementById('so1').value.trim();
            var s2 = document.getElementById('so2').value.trim();

            // Kiểm tra không rỗng
            if (s1 === '' || s2 === '') {
                hienLoi('');
                document.getElementById('ketqua').value = '';
                return;
            }

            var n1 = parseFloat(s1);
            var n2 = parseFloat(s2);

            // Kiểm tra hợp lệ
            if (isNaN(n1)) {
                hienLoi('⚠ "So thu nhat" phải là số!');
                return;
            }
            if (isNaN(n2)) {
                hienLoi('⚠ "So thu hai" phải là số!');
                return;
            }

            // Kiểm tra chia cho 0
            if (phepTinh === '/' && n2 === 0) {
                hienLoi('⚠ "So thu hai" phải khác không khi chia!');
                return;
            }

            hienLoi(''); // xóa lỗi

            var kq;
            switch (phepTinh) {
                case '+':
                    kq = n1 + n2;
                    break;
                case '-':
                    kq = n1 - n2;
                    break;
                case '*':
                    kq = n1 * n2;
                    break;
                case '/':
                    kq = n1 / n2;
                    break;
                case '^':
                    kq = Math.pow(n1, n2);
                    break;
            }

            // Làm tròn nếu cần
            document.getElementById('ketqua').value = parseFloat(kq.toFixed(10));
        }
    </script>
</body>

</html>
