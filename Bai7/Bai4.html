<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 4 - May tinh don gian</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            margin: 30px;
            display: flex;
            justify-content: center;
        }
        
        .khung {
            border: 1px solid #d5d5d5;
            border-radius: 10px;
            padding: 16px;
            width: 360px;
            background: #fafafa;
        }
        
        h2 {
            margin-top: 0;
            text-align: center;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        td {
            padding: 6px 0;
        }
        
        input[type="number"],
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }
        
        button {
            width: 52px;
            height: 34px;
            margin-right: 6px;
            cursor: pointer;
        }
        
        .hang-nut {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        #thongBao {
            margin-top: 10px;
            color: #8a0f0f;
            min-height: 20px;
        }
    </style>
    <script>
        function baoLoi(thongDiep) {
            document.getElementById("thongBao").textContent = thongDiep;
        }

        function tinhToan(phepTinh) {
            const so1 = document.getElementById("so1").value.trim();
            const so2 = document.getElementById("so2").value.trim();
            const oKetQua = document.getElementById("ketQua");
            baoLoi("");

            if (so1 === "" || so2 === "") {
                baoLoi("Vui long nhap day du ca hai so.");
                oKetQua.value = "";
                return;
            }

            const soThuNhat = Number(so1);
            const soThuHai = Number(so2);

            if (Number.isNaN(soThuNhat) || Number.isNaN(soThuHai)) {
                baoLoi("Gia tri nhap vao khong hop le.");
                oKetQua.value = "";
                return;
            }

            let ketQua = 0;

            switch (phepTinh) {
                case '+':
                    ketQua = soThuNhat + soThuHai;
                    break;
                case '-':
                    ketQua = soThuNhat - soThuHai;
                    break;
                case '*':
                    ketQua = soThuNhat * soThuHai;
                    break;
                case '/':
                    if (soThuHai === 0) {
                        baoLoi("Khong the chia cho 0.");
                        oKetQua.value = "";
                        return;
                    }
                    ketQua = soThuNhat / soThuHai;
                    break;
                case '^':
                    ketQua = Math.pow(soThuNhat, soThuHai);
                    break;
                default:
                    baoLoi("Phep tinh khong hop le.");
                    oKetQua.value = "";
                    return;
            }

            oKetQua.value = ketQua;
        }
    </script>
</head>

<body>
    <div class="khung">
        <h2>Bai 4: May tinh don gian</h2>
        <table>
            <tr>
                <td>So thu nhat</td>
                <td><input type="number" id="so1" step="any"></td>
            </tr>
            <tr>
                <td>So thu hai</td>
                <td><input type="number" id="so2" step="any"></td>
            </tr>
            <tr>
                <td>Thao tac</td>
                <td>
                    <div class="hang-nut">
                        <button type="button" onclick="tinhToan('+')">+</button>
                        <button type="button" onclick="tinhToan('-')">-</button>
                        <button type="button" onclick="tinhToan('*')">*</button>
                        <button type="button" onclick="tinhToan('/')">/</button>
                        <button type="button" onclick="tinhToan('^')">^</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td>Ket qua</td>
                <td><input type="text" id="ketQua" readonly></td>
            </tr>
        </table>
        <div id="thongBao"></div>
    </div>
</body>

</html>
