<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 2 - Doi mau nen</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            transition: background-color 0.35s ease;
        }
        
        .khung {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #d0d0d0;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        button {
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
    <script>
        function mauHopLe(mau) {
            const mauThu = new Option().style;
            mauThu.color = mau;
            return mauThu.color !== "";
        }

        function thayDoiMauNen() {
            const mauNen = prompt("Nhap mau nen (vi du: red, #f4a261, rgb(200, 220, 255)):", "");

            if (mauNen === null) {
                return;
            }

            const mauDaNhap = mauNen.trim();
            if (mauDaNhap === "") {
                alert("Ban chua nhap mau.");
                return;
            }

            if (!mauHopLe(mauDaNhap)) {
                alert("Gia tri mau khong hop le. Vui long thu lai.");
                return;
            }

            document.body.style.backgroundColor = mauDaNhap;
            document.getElementById("thongBao").textContent = "Da doi mau nen thanh: " + mauDaNhap;
        }
    </script>
</head>

<body onload="thayDoiMauNen()">
    <div class="khung">
        <h2>Bai 2: Doi mau nen trang</h2>
        <p id="thongBao">Nhap mau bang hop thoai khi trang vua tai.</p>
        <button type="button" onclick="thayDoiMauNen()">Doi mau lai</button>
    </div>
</body>

</html>
