<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 2 - Đổi màu nền</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        
        button {
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 4px;
        }
        
        button:hover {
            background: #005fa3;
        }
        
        p {
            margin-bottom: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <p>Chào mừng đến Website</p>
    <button onclick="doiMauNen()">Đổi màu nền</button>

    <script>
        function doiMauNen() {
            var mau = prompt("Nhập màu nền của trang:");
            if (mau !== null && mau.trim() !== "") {
                document.body.style.backgroundColor = mau.trim();
            }
        }
    </script>
</body>

</html>
