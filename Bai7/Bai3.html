<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 3 - Bật tắt bóng đèn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f0f0f0;
            text-align: center;
        }
        
        h3 {
            margin-bottom: 20px;
        }
        /* SVG bóng đèn */
        
        #bulb-container {
            display: inline-block;
            cursor: pointer;
            user-select: none;
        }
        
        #bulb-container:hover {
            transform: scale(1.05);
            transition: transform 0.1s;
        }
        /* Phần thủy tinh bóng đèn */
        
        #glass {
            fill: #cccccc;
            stroke: #888;
            stroke-width: 2;
            transition: fill 0.3s;
        }
        
        #shine {
            fill: #e0e0e0;
            opacity: 0.6;
            transition: fill 0.3s, opacity 0.3s;
        }
        /* Trạng thái BẬT */
        
        .on #glass {
            fill: #FFE000;
        }
        
        .on #shine {
            fill: #fff8aa;
            opacity: 0.8;
        }
        
        .on #glow {
            opacity: 1;
        }
        
        .on #filament {
            stroke: #ff9900;
        }
        /* Ánh sáng tỏa ra */
        
        #glow {
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #filament {
            stroke: #888;
            stroke-width: 1.5;
            fill: none;
            transition: stroke 0.3s;
        }
        
        p#status {
            margin-top: 14px;
            font-size: 15px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>

<body>
    <h3>Click vào bóng đèn để bật / tắt</h3>

    <div id="bulb-container" onclick="toggleLight()" title="Click để bật/tắt đèn">
        <svg id="bulb-svg" width="160" height="230" viewBox="0 0 160 230">

      <!-- Ánh sáng tỏa ra (glow rays) -->
      <g id="glow" opacity="0">
        <line x1="80" y1="10" x2="80" y2="-5" stroke="#FFE000" stroke-width="3" stroke-linecap="round"/>
        <line x1="120" y1="25" x2="132" y2="13" stroke="#FFE000" stroke-width="3" stroke-linecap="round"/>
        <line x1="148" y1="65" x2="163" y2="60" stroke="#FFE000" stroke-width="3" stroke-linecap="round"/>
        <line x1="40" y1="25" x2="28" y2="13" stroke="#FFE000" stroke-width="3" stroke-linecap="round"/>
        <line x1="12" y1="65" x2="-3" y2="60" stroke="#FFE000" stroke-width="3" stroke-linecap="round"/>
      </g>

      <!-- Thân bóng đèn (glass) -->
      <ellipse id="glass" cx="80" cy="85" rx="55" ry="60"/>

      <!-- Bóng sáng trên kính -->
      <ellipse id="shine" cx="62" cy="60" rx="18" ry="22" transform="rotate(-20,62,60)"/>

      <!-- Dây tóc -->
      <path id="filament" d="M65,120 Q72,105 80,115 Q88,105 95,120"/>

      <!-- Đế bóng đèn -->
      <rect x="58" y="138" width="44" height="10" rx="3" fill="#b8860b" stroke="#888" stroke-width="1"/>
      <rect x="60" y="148" width="40" height="10" rx="2" fill="#a0740a" stroke="#888" stroke-width="1"/>
      <rect x="62" y="158" width="36" height="10" rx="2" fill="#b8860b" stroke="#888" stroke-width="1"/>
      <rect x="64" y="168" width="32" height="14" rx="3" fill="#888" stroke="#666" stroke-width="1"/>

      <!-- Tiếp điểm đáy -->
      <rect x="74" y="182" width="12" height="6" rx="2" fill="#555"/>
    </svg>
    </div>

    <p id="status">🔴 Đèn đang TẮT — Click để bật</p>

    <script>
        var isOn = false;

        function toggleLight() {
            isOn = !isOn;
            var container = document.getElementById('bulb-container');
            var status = document.getElementById('status');

            if (isOn) {
                container.classList.add('on');
                status.textContent = '🟡 Đèn đang BẬT — Click để tắt';
                status.style.color = '#cc8800';
            } else {
                container.classList.remove('on');
                status.textContent = '🔴 Đèn đang TẮT — Click để bật';
                status.style.color = '#444';
            }
        }
    </script>
</body>

</html>
