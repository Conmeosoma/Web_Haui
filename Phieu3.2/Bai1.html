<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bài 1 - Phiếu 2</title>
    <style>
        body {
            background-color: lightblue;
            /* Nền xanh nhạt */
        }
        
        h1 {
            color: white;
            /* Dòng 1 chữ trắng */
        }
        
        p {
            color: black;
            /* Dòng 2 chữ đen */
        }
    </style>
</head>

<body>
    <h1>My First CSS Example</h1>
    <p>This is a paragraph.</p>
</body>

</html>
