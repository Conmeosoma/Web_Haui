<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 3 - Phiếu 2</title>
    <style>
        h2 {
            color: green;
            text-align: center;
        }
        
        .tieu-de-mon {
            font-weight: bold;
            text-decoration: underline;
        }
        /* Màu đỏ cho công thức */
        
        .cong-thuc {
            color: #FF0000;
        }
        /* Định dạng cho đoạn code */
        
        .doan-code {
            color: #0000CC;
            background-color: #CCCCCC;
            font-family: monospace;
            /* Font chữ dành cho code */
            padding: 20px;
            margin: 10px 0;
            white-space: pre;
            /* Giữ nguyên khoảng trắng và dấu xuống dòng */
            width: fit-content;
        }
    </style>
</head>

<body>
    <h2>Định dạng văn bản</h2>

    <p>
        <span class="tieu-de-mon">Hóa học:</span> Nước: <span class="cong-thuc">H<sub>2</sub>O</span> ; Axit Sunfuric: <span class="cong-thuc">H<sub>2</sub>SO<sub>4</sub></span>
    </p>

    <p>
        <span class="tieu-de-mon">Toán học:</span> Phương trình bậc 2: <span class="cong-thuc">ax<sup>2</sup> + bx + c = 0</span>
    </p>

    <p>
        <span class="tieu-de-mon">Tin học:</span> Vòng lặp For.
    </p>

    <div class="doan-code">
        For i = 0 To 10 Tong = Tong + 1 Next

    </div>

</body>

</html>
