<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 1 - Phương trình bậc 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&family=Nunito:wght@400;700;900&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            color: #e2e8f0;
        }
        
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px 48px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .equation {
            font-family: 'Fira Mono', monospace;
            font-size: 1.5rem;
            color: #38bdf8;
            margin-bottom: 32px;
            border-left: 3px solid #38bdf8;
            padding-left: 16px;
        }
        
        .step {
            background: #0f172a;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 14px;
            font-family: 'Fira Mono', monospace;
            font-size: 0.92rem;
            line-height: 1.8;
            color: #cbd5e1;
        }
        
        .step .label {
            color: #f59e0b;
            font-weight: 700;
        }
        
        .result-box {
            margin-top: 24px;
            background: linear-gradient(135deg, #0369a1, #0e7490);
            border-radius: 12px;
            padding: 20px 24px;
            text-align: center;
        }
        
        .result-box .title {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #bae6fd;
            margin-bottom: 10px;
        }
        
        .result-box .values {
            font-family: 'Fira Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Bài 1 — Phiếu số 2</h1>
        <div class="equation" id="eq"></div>

        <div class="step" id="step1"></div>
        <div class="step" id="step2"></div>
        <div class="result-box" id="result"></div>
    </div>

    <script>
        const a = 4,
            b = 6,
            c = 2;

        // Hiển thị phương trình
        document.getElementById('eq').textContent = `${a}x² + ${b}x + ${c} = 0`;

        // Tính delta
        const delta = b * b - 4 * a * c;
        document.getElementById('step1').innerHTML =
            `<span class="label">Δ</span> = b² − 4ac = ${b}² − 4×${a}×${c} = <strong>${delta}</strong>`;

        // Phân loại và tính nghiệm
        let step2HTML = '',
            resultHTML = '';

        if (delta < 0) {
            step2HTML = `<span class="label">Δ = ${delta} &lt; 0</span> → Phương trình vô nghiệm`;
            resultHTML = `<div class="title">Kết quả</div><div class="values">Vô nghiệm</div>`;
        } else if (delta === 0) {
            const x = -b / (2 * a);
            step2HTML = `<span class="label">Δ = 0</span> → Nghiệm kép: x = −b / 2a = ${-b} / ${2*a}`;
            resultHTML = `<div class="title">Kết quả</div><div class="values">x = ${x}</div>`;
        } else {
            const sqrtDelta = Math.sqrt(delta);
            const x1 = (-b + sqrtDelta) / (2 * a);
            const x2 = (-b - sqrtDelta) / (2 * a);
            step2HTML =
                `<span class="label">Δ = ${delta} &gt; 0</span> → √Δ = ${sqrtDelta}<br>` +
                `x₁ = (−b + √Δ) / 2a = (${-b} + ${sqrtDelta}) / ${2*a} = <strong>${x1}</strong><br>` +
                `x₂ = (−b − √Δ) / 2a = (${-b} − ${sqrtDelta}) / ${2*a} = <strong>${x2}</strong>`;
            resultHTML = `<div class="title">Kết quả</div><div class="values">x₁ = ${x1} &nbsp;|&nbsp; x₂ = ${x2}</div>`;
        }

        document.getElementById('step2').innerHTML = step2HTML;
        document.getElementById('result').innerHTML = resultHTML;
    </script>
</body>

</html>
