<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bài 5 - Menu Dọc Hai Cấp</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    /* Menu cấp 1 */
    ul.menu {
      width: 200px;
    }

    ul.menu > li {
      position: relative;
    }

    ul.menu > li > a {
      display: block;
      background-color: #00008B;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border-bottom: 1px solid #ffffff44;
    }

    ul.menu > li:last-child > a {
      border-bottom: none;
    }

    ul.menu > li > a:hover {
      background-color: red;
    }

    /* Submenu cấp 2 */
    ul.menu > li > ul.submenu {
      display: none;
      position: absolute;
      top: 0;
      left: 100%; /* Xuất hiện sang bên phải */
      min-width: 180px;
      z-index: 100;
    }

    ul.menu > li > ul.submenu li a {
      display: block;
      background-color: red;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border-bottom: 1px solid #ffffff44;
    }

    ul.menu > li > ul.submenu li:last-child a {
      border-bottom: none;
    }

    ul.menu > li > ul.submenu li a:hover {
      background-color: darkred;
    }

    /* Hiện submenu khi hover */
    ul.menu > li:hover > ul.submenu {
      display: block;
    }

    ul.menu > li:hover > a {
      background-color: red;
    }
  </style>
</head>
<body>
  <ul class="menu">
    <li>
      <a href="#">Chính trị-xã hội</a>
      <ul class="submenu">
        <li><a href="#">Thư viện pháp</a></li>
        <li><a href="#">Sống khỏe</a></li>
        <li><a href="#">Pháp luật</a></li>
      </ul>
    </li>
    <li><a href="#">Thế giới</a></li>
    <li><a href="#">Nhịp sống trẻ</a></li>
    <li><a href="#">Giáo dục</a></li>
    <li><a href="#">Kinh tế</a></li>
  </ul>
</body>
</html>
