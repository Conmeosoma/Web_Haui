<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bài 4 - Menu Dọc Một Cấp</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    ul.menu {
      list-style: none;
      margin: 0;
      padding: 0;
      width: 200px;
    }

    ul.menu li a {
      display: block;
      background-color: #00008B;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border-bottom: 1px solid #ffffff44;
    }

    ul.menu li:last-child a {
      border-bottom: none;
    }

    ul.menu li a:hover {
      background-color: red;
    }
  </style>
</head>
<body>
  <ul class="menu">
    <li><a href="#">Chính trị-xã hội</a></li>
    <li><a href="#">Thế giới</a></li>
    <li><a href="#">Nhịp sống trẻ</a></li>
    <li><a href="#">Giáo dục</a></li>
    <li><a href="#">Kinh tế</a></li>
  </ul>
</body>
</html>
